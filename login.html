<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - mrcog-yemen.com</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <!-- Simple Navigation (for Auth Pages) -->
    <header class="navbar glass">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">MRCOG<span class="highlight">-Yemen</span></span>
            </a>
            <div class="nav-actions">
                <button class="lang-switcher btn btn-secondary" style="padding: 5px 15px; font-size: 0.9rem; margin: 0 5px;">English</button>
                <a href="index.html" class="btn btn-outline" data-i18n="auth-back">العودة للرئيسية</a>
            </div>
        </div>
    </header>

    <!-- Main Auth Form -->
    <div class="auth-wrapper">
        <div class="auth-bg"></div>
        <div class="container auth-container">
            <div class="auth-card glass-hover">
                <div class="auth-header text-center">
                    <h2 data-i18n="login-title">مرحباً <span class="highlight">مجدداً!</span></h2>
                    <p class="text-muted" data-i18n="login-desc">قم بتسجيل الدخول للوصول إلى الكورسات الخاصة بك.</p>
                </div>
                
                <form class="auth-form" action="index.html" method="GET">
                    <div class="form-group">
                        <label for="email" data-i18n="label-email">البريد الإلكتروني</label>
                        <input type="email" id="email" class="form-control" placeholder="أدخل بريدك الإلكتروني" data-i18n="ph-email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" data-i18n="label-password">كلمة المرور</label>
                        <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" data-i18n="ph-password" required>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            <span data-i18n="label-remember">تذكرني</span>
                        </label>
                        <a href="#" class="forgot-link" data-i18n="link-forgot">نسيت كلمة المرور؟</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block btn-large mt-4" data-i18n="btn-login">تسجيل الدخول</button>
                    
                    <div class="auth-footer text-center mt-4">
                        <p data-i18n="no-account">ليس لديك حساب؟ <a href="register.html" class="highlight under-link" data-i18n="link-register">إنشاء حساب جديد</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
